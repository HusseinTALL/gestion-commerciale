events {
    worker_connections 1024;
}

http {
    upstream user_service    { server user-service:3001; }
    upstream sale_service    { server sale-service:3002; }
    upstream crm_service     { server crm-service:3003; }
    upstream commission_svc  { server commission-service:3004; }
    upstream planning_svc    { server planning-service:3005; }
    upstream ristourne_svc   { server ristourne-service:3006; }
    upstream stock_svc       { server stock-service:3007; }
    upstream content_svc     { server content-service:3008; }
    upstream notification_svc { server notification-service:3009; }

    server {
        listen 80;
        server_name _;

        # Health check global
        location /health {
            return 200 '{"status":"ok","gateway":"gestion-commerciale"}';
            add_header Content-Type application/json;
        }

        # User & Auth Service
        location /api/auth/    { proxy_pass http://user_service; }
        location /api/users/   { proxy_pass http://user_service; }

        # Sale Service
        location /api/products/ { proxy_pass http://sale_service; }
        location /api/sales/    { proxy_pass http://sale_service; }

        # CRM Service
        location /api/clients/  { proxy_pass http://crm_service; }
        location /api/visits/   { proxy_pass http://crm_service; }

        # Commission Service
        location /api/commissions/ { proxy_pass http://commission_svc; }

        # Planning Service
        location /api/plans/      { proxy_pass http://planning_svc; }
        location /api/deliveries/ { proxy_pass http://planning_svc; }

        # Ristourne Service
        location /api/ristournes/ { proxy_pass http://ristourne_svc; }
        location /api/tiers/      { proxy_pass http://ristourne_svc; }

        # Stock Service
        location /api/depots/ { proxy_pass http://stock_svc; }
        location /api/stock/  { proxy_pass http://stock_svc; }

        # Content Service
        location /api/resources/  { proxy_pass http://content_svc; }
        location /api/deliveries-content/ { proxy_pass http://content_svc; }

        # Notification Service
        location /api/notifications/ { proxy_pass http://notification_svc; }

        # Headers communs
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
