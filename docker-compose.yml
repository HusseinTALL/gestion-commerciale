version: '3.9'

services:
  # ─── GATEWAY ──────────────────────────────────────────────────────────────
  gateway:
    build: ./gateway
    ports:
      - "80:80"
    depends_on:
      - user-service
      - sale-service
      - crm-service
      - commission-service
      - planning-service
      - ristourne-service
      - stock-service
      - content-service
      - notification-service
    networks:
      - gestion-net

  # ─── USER SERVICE ─────────────────────────────────────────────────────────
  user-service:
    build: ./services/user-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@user-db:5432/user_db
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - gestion-net

  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: user_db
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gestion-net

  # ─── SALE SERVICE ─────────────────────────────────────────────────────────
